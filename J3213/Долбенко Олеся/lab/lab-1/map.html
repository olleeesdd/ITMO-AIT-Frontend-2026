<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта маршрутов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Travel Planner</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Личный кабинет</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Вход</a></li>
                <li class="nav-item"><a class="nav-link" href="register.html">Регистрация</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Карта</h2>
    <p>Нажмите на маркер, чтобы увидеть информацию о месте</p>
    <div id="map" style="height: 500px; border-radius: 10px;"></div>
</div>

<script>
    var map = L.map('map').setView([55.751244, 37.618423], 5);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);
    
    var places = [
        { name: "Париж", coords: [48.8566, 2.3522], desc: "Эйфелева башня, Лувр" },
        { name: "Байкал", coords: [53.5587, 108.1650], desc: "Самое глубокое озеро" },
        { name: "Санкт-Петербург", coords: [59.9343, 30.3351], desc: "Эрмитаж, мосты" },
        { name: "Алтай", coords: [50.2468, 86.6620], desc: "Горы, реки" },
        { name: "Сочи", coords: [43.5855, 39.7231], desc: "Море, горы" }
    ];
    
    places.forEach(place => {
        L.marker(place.coords).addTo(map)
            .bindPopup(`<b>${place.name}</b><br>${place.desc}<br><a href="search.html">Посмотреть маршруты</a>`);
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
