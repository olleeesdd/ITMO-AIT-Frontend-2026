<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск | Travel Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Travel Planner</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Личный кабинет</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Вход</a></li>
                <li class="nav-item"><a class="nav-link" href="register.html">Регистрация</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Поиск направлений</h2>
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-header">Фильтры</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Страна</label>
                        <select class="form-select" id="filterCountry">
                            <option value="all">Все</option>
                            <option value="france">Франция</option>
                            <option value="russia">Россия</option>
                            <option value="italy">Италия</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Тип размещения</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterHotel" value="hotel">
                            <label class="form-check-label" for="filterHotel">Отель</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterApartment" value="apartment">
                            <label class="form-check-label" for="filterApartment">Апартаменты</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Тип</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterCity" value="city">
                            <label class="form-check-label" for="filterCity">Город</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterNature" value="nature">
                            <label class="form-check-label" for="filterNature">Природа</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Бюджет</label>
                        <select class="form-select" id="filterBudget">
                            <option value="all">Все</option>
                            <option value="low">Эконом (до 50 000 ₽)</option>
                            <option value="medium">Стандарт (50 000 - 200 000 ₽)</option>
                            <option value="high">Премиум (200 000+ ₽)</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Длительность</label>
                        <select class="form-select" id="filterDuration">
                            <option value="all">Все</option>
                            <option value="short">1-7 дня</option>
                            <option value="medium">7-14 дней</option>
                            <option value="long">14+ дней</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-9">
            <div id="resultsContainer" class="d-flex flex-nowrap overflow-auto" style="gap: 20px; padding-bottom: 10px;">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
